<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>恐龙跑酷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .game-wrapper {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,.1);
    overflow: hidden;
  }

  canvas {
    display: block;
    cursor: pointer;
  }

  .tip {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 13px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="game"></canvas>
</div>
<p class="tip">空格键 / 点击屏幕 &nbsp;起跳　　↓键 &nbsp;快速下落　　🛡 护盾可抵挡一次伤害</p>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = 800, H = 300;
  canvas.width  = W;
  canvas.height = H;

  function resize() {
    const scale = Math.min(
      (window.innerWidth  - 20) / W,
      (window.innerHeight - 80) / H,
      1
    );
    canvas.style.width  = W * scale + 'px';
    canvas.style.height = H * scale + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  const GROUND_Y = 260;
  const DINO_X   = 80;

  const colors = {
    body:     '#535353',
    eye:      '#fff',
    pupil:    '#333',
    dark:     '#3a3a3a',
    shield:   '#4da6ff',
    shieldBg: '#1a3a5c',
    pitDark:  '#2b2b2b',
    pitMid:   '#3d3d3d',
  };

  // ---- 音效 ----
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }
  function beep(freq, duration, type = 'square', vol = 0.06) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  }
  function sfxJump()     { beep(300, 0.10); beep(500, 0.06); }
  function sfxDie()      { beep(120, 0.25, 'sawtooth', 0.08); }
  function sfxScore()    { beep(800, 0.05, 'square', 0.04); }
  function sfxPickup()   { beep(440, 0.06); beep(660, 0.06); beep(880, 0.08); }
  function sfxShieldBrk(){ beep(200, 0.18, 'sawtooth', 0.07); beep(100, 0.12, 'triangle', 0.05); }

  // ---- 游戏状态 ----
  const STATE = { WAITING: 0, RUNNING: 1, OVER: 2 };
  let state     = STATE.WAITING;
  let score     = 0;
  let hiScore   = parseInt(localStorage.getItem('dinoHiScoreV2')) || 0;
  let speed     = 6;

  // ---- 特效 ----
  let effects = []; // { x, y, alpha, text, color }

  function addEffect(x, y, text, color) {
    effects.push({ x, y, text, color, alpha: 1, life: 40 });
  }

  // ---- 恐龙 ----
  const dino = {
    x: DINO_X,
    y: GROUND_Y,
    vy: 0,
    width:  40,
    height: 44,
    grounded: true,
    ducking: false,
    legFrame: 0,
    legTimer: 0,
    hasShield: false,
    shieldFlash: 0,   // 护盾闪烁计时

    reset() {
      this.y = GROUND_Y;
      this.vy = 0;
      this.grounded = true;
      this.ducking = false;
      this.legFrame = 0;
      this.legTimer = 0;
      this.hasShield = false;
      this.shieldFlash = 0;
    },

    jump() {
      if (!this.grounded) return;
      this.vy = -12;
      this.grounded = false;
      sfxJump();
    },

    duck(active) {
      if (!this.grounded) return;
      this.ducking = active;
    },

    update() {
      if (this.shieldFlash > 0) this.shieldFlash--;

      if (!this.grounded) {
        this.vy += 0.65;
        this.y += this.vy;
        if (this.y >= GROUND_Y) {
          this.y = GROUND_Y;
          this.vy = 0;
          this.grounded = true;
        }
      }
      if (this.grounded && state === STATE.RUNNING) {
        this.legTimer++;
        if (this.legTimer > 4) {
          this.legTimer = 0;
          this.legFrame = (this.legFrame + 1) % 2;
        }
      }
    },

    draw(ctx) {
      const x = this.x, y = this.y;
      const { body, eye, pupil, dark } = colors;

      // ---- 护盾光环 ----
      if (this.hasShield) {
        const pulse = 1 + 0.08 * Math.sin(Date.now() / 150);
        const cx = this.ducking && this.grounded ? x + 22 : x + 16;
        const cy = this.ducking && this.grounded ? y - 12 : y - 28;
        const rx = (this.ducking && this.grounded ? 38 : 30) * pulse;
        const ry = (this.ducking && this.grounded ? 20 : 34) * pulse;

        // 外发光
        ctx.save();
        ctx.globalAlpha = 0.25 + 0.1 * Math.sin(Date.now() / 200);
        ctx.fillStyle = colors.shield;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx + 4, ry + 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // 护盾环
        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.strokeStyle = colors.shield;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        // 顶部小盾牌图标
        const sx = cx - 6, sy = cy - ry - 10;
        ctx.fillStyle = colors.shieldBg;
        ctx.fillRect(sx - 1, sy - 1, 14, 12);
        ctx.fillStyle = colors.shield;
        ctx.fillRect(sx + 2, sy, 8, 3);
        ctx.fillRect(sx + 4, sy + 3, 4, 5);
        ctx.fillRect(sx, sy + 8, 12, 2);
      }

      if (this.ducking && this.grounded) {
        // 蹲下
        ctx.fillStyle = body;
        ctx.fillRect(x, y - 22, 54, 18);
        ctx.fillRect(x - 6, y - 30, 22, 14);
        ctx.fillStyle = eye;
        ctx.fillRect(x - 2, y - 28, 6, 4);
        ctx.fillStyle = pupil;
        ctx.fillRect(x + 4, y - 28, 3, 4);
        ctx.fillStyle = dark;
        ctx.fillRect(x + 10, y - 4, 8, 4);
        ctx.fillRect(x + 28, y - 4, 8, 4);
      } else {
        // 站立 / 跳跃
        const h = 38;
        ctx.fillStyle = body;
        ctx.fillRect(x, y - h, 22, h);
        ctx.fillRect(x + 6, y - h - 12, 24, 16);
        ctx.fillRect(x + 30, y - h - 4, 10, 4);
        ctx.fillStyle = eye;
        ctx.fillRect(x + 22, y - h - 8, 7, 5);
        ctx.fillStyle = pupil;
        ctx.fillRect(x + 27, y - h - 7, 3, 3);
        ctx.fillStyle = dark;
        ctx.fillRect(x - 8, y - h + 10, 8, 4);
        ctx.fillRect(x + 10, y - h + 20, 3, 6);
        if (this.grounded && this.legFrame === 0) {
          ctx.fillRect(x + 4, y - 4, 7, 4);
          ctx.fillRect(x + 16, y - 4, 7, 4);
        } else if (this.grounded && this.legFrame === 1) {
          ctx.fillRect(x + 2, y - 4, 7, 4);
          ctx.fillRect(x + 18, y - 4, 7, 4);
        } else {
          ctx.fillRect(x + 4,  y - 4, 7, 4);
          ctx.fillRect(x + 14, y - 4, 7, 4);
        }
      }
    },

    getHitbox() {
      if (this.ducking && this.grounded) {
        return { x: this.x - 4, y: this.y - 28, w: 50, h: 26 };
      }
      return { x: this.x + 2, y: this.y - 48, w: 32, h: 46 };
    }
  };

  // ---- 障碍物 ----
  let obstacles = [];

  const OBSTACLE_TYPES = {
    SMALL_CACTUS: {
      width: 16, height: 34,
      draw(ctx, ox, oy) {
        ctx.fillStyle = colors.body;
        const x = ox, y = oy - this.height;
        ctx.fillRect(x + 6, y, 5, this.height);
        ctx.fillRect(x, y + 8, 6, 4);
        ctx.fillRect(x, y + 6, 4, 8);
        ctx.fillRect(x + 11, y + 14, 5, 4);
        ctx.fillRect(x + 13, y + 12, 4, 8);
      }
    },
    BIG_CACTUS: {
      width: 24, height: 48,
      draw(ctx, ox, oy) {
        ctx.fillStyle = colors.body;
        const x = ox, y = oy - this.height;
        ctx.fillRect(x + 10, y, 5, this.height);
        ctx.fillRect(x + 4, y + 22, 6, 4);
        ctx.fillRect(x + 4, y + 20, 4, 8);
        ctx.fillRect(x - 2, y + 12, 6, 4);
        ctx.fillRect(x - 2, y + 10, 4, 8);
        ctx.fillRect(x + 15, y + 16, 5, 4);
        ctx.fillRect(x + 17, y + 14, 4, 8);
      }
    },
    BIRD: {
      width: 40, height: 28,
      flyingY: [GROUND_Y - 60, GROUND_Y - 100, GROUND_Y - 130],
      draw(ctx, ox, oy) {
        const wingUp = Math.floor(Date.now() / 200) % 2 === 0;
        ctx.fillStyle = colors.body;
        ctx.fillRect(ox + 10, oy - 10, 22, 8);
        ctx.fillRect(ox + 30, oy - 14, 10, 4);
        ctx.fillRect(ox + 32, oy - 16, 4, 6);
        if (wingUp) {
          ctx.fillRect(ox + 14, oy - 18, 10, 8);
        } else {
          ctx.fillRect(ox + 14, oy - 4, 10, 8);
        }
      }
    }
  };

  // ---- 坑洞 ----
  let pits = [];
  const PIT_WIDTH  = 44;
  const PIT_HEIGHT = 26;

  function drawPit(px, py) {
    // py = GROUND_Y, 坑从地面线往下
    const x = px, y = py;
    // 洞内暗色
    ctx.fillStyle = colors.pitDark;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo(x + PIT_WIDTH / 2, y + PIT_HEIGHT + 4, x + PIT_WIDTH, y);
    ctx.quadraticCurveTo(x + PIT_WIDTH / 2, y + 4, x, y);
    ctx.fill();

    // 内缘高光（模拟深度）
    ctx.fillStyle = colors.pitMid;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 1);
    ctx.quadraticCurveTo(x + PIT_WIDTH / 2, y + PIT_HEIGHT - 2, x + PIT_WIDTH - 4, y + 1);
    ctx.quadraticCurveTo(x + PIT_WIDTH / 2, y + 8, x + 4, y + 1);
    ctx.fill();

    // 底部碎石
    ctx.fillStyle = '#555';
    for (let i = 0; i < 3; i++) {
      const sx = x + 10 + i * 12 + (Math.sin(Date.now() / 1000 + i * 7) % 1) * 4;
      const sy = y + PIT_HEIGHT / 2 + i * 3;
      ctx.fillRect(sx, sy, 3, 2);
    }
  }

  // ---- 道具（护盾） ----
  let powerUps = [];

  function drawShieldPickup(p) {
    const x = p.x, y = p.y;
    const bob = Math.sin(Date.now() / 300 + (p._seed || 0)) * 4;
    const cy = y - 22 + bob;

    // 发光底座
    ctx.save();
    ctx.globalAlpha = 0.2 + 0.1 * Math.sin(Date.now() / 250);
    ctx.fillStyle = colors.shield;
    ctx.beginPath();
    ctx.arc(x + 12, cy, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 护盾图标
    ctx.fillStyle = colors.shieldBg;
    ctx.fillRect(x, cy - 6, 24, 16);
    ctx.fillStyle = colors.shield;
    ctx.fillRect(x + 4, cy - 2, 16, 4);
    ctx.fillRect(x + 8, cy + 2, 8, 6);
    ctx.fillRect(x, cy + 8, 24, 3);

    // 旋转的十字星
    const t = Date.now() / 400;
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#fff';
    const cx = x + 12, ccy = cy - 8;
    ctx.translate(cx, ccy);
    ctx.rotate(t);
    ctx.fillRect(-6, -1, 12, 2);
    ctx.fillRect(-1, -6, 2, 12);
    ctx.restore();
  }

  // ---- 生成逻辑 ----
  function spawnObstacle() {
    const r = Math.random();
    let type;
    if (r < 0.35) {
      type = { ...OBSTACLE_TYPES.SMALL_CACTUS };
    } else if (r < 0.60) {
      type = { ...OBSTACLE_TYPES.BIG_CACTUS };
    } else {
      type = { ...OBSTACLE_TYPES.BIRD };
      type.flyY = type.flyingY[Math.floor(Math.random() * type.flyingY.length)];
    }
    type.x = W + 20;
    type.y = type.flyY !== undefined ? type.flyY : GROUND_Y;
    type.passed = false;
    type.kind = 'obstacle';
    obstacles.push(type);
  }

  function spawnPit() {
    pits.push({
      x: W + 20,
      width: PIT_WIDTH,
      passed: false,
      kind: 'pit',
    });
  }

  function spawnShield() {
    powerUps.push({
      x: W + 20,
      y: GROUND_Y,
      _seed: Math.random() * 100,
      kind: 'shield',
    });
  }

  // ---- 云 ----
  let clouds = [];
  function drawCloud(c) {
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    const cx = c.x, cy = c.y, w = c.w, h = c.h;
    ctx.ellipse(cx, cy, w / 2, h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.22, cy + 4, w * 0.35, h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + w * 0.22, cy + 2, w * 0.3, h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---- 地面 ----
  let groundOffset = 0;
  const GROUND_DETAILS = [];
  for (let i = 0; i < 30; i++) {
    GROUND_DETAILS.push(Math.random() * W);
  }

  function drawGround() {
    ctx.strokeStyle = '#535353';
    ctx.lineWidth = 2;

    // 坑洞处要断开地面线
    const drawSegments = [{ from: 0, to: W }];

    for (let pit of pits) {
      if (pit.x > -60 && pit.x < W + 60) {
        // 找到包含这个坑的线段并切割
        for (let j = drawSegments.length - 1; j >= 0; j--) {
          const seg = drawSegments[j];
          const pLeft  = pit.x;
          const pRight = pit.x + PIT_WIDTH;
          if (pLeft < seg.to && pRight > seg.from) {
            // 有重叠，切割
            drawSegments.splice(j, 1);
            if (seg.from < pLeft) {
              drawSegments.push({ from: seg.from, to: pLeft });
            }
            if (seg.to > pRight) {
              drawSegments.push({ from: pRight, to: seg.to });
            }
          }
        }
      }
    }

    // 按 from 排序
    drawSegments.sort((a, b) => a.from - b.from);

    // 绘制每段
    for (let seg of drawSegments) {
      ctx.beginPath();
      ctx.moveTo(seg.from, GROUND_Y);
      ctx.lineTo(seg.to, GROUND_Y);
      ctx.stroke();
    }

    // 碎石
    ctx.fillStyle = '#d0d0d0';
    for (let g of GROUND_DETAILS) {
      let gx = ((g - groundOffset) % W + W) % W;
      // 别画在坑里
      let inPit = false;
      for (let pit of pits) {
        if (gx > pit.x && gx < pit.x + PIT_WIDTH) { inPit = true; break; }
      }
      if (!inPit) {
        ctx.fillRect(gx, GROUND_Y + 4, 3 + Math.random() * 3, 2);
      }
    }
  }

  // ---- 碰撞 ----
  function rectsCollide(a, b) {
    return (
      a.x < b.x + b.w &&
      a.x + a.w > b.x &&
      a.y < b.y + b.h &&
      a.y + a.h > b.y
    );
  }

  // ---- 重置 ----
  function resetGame() {
    dino.reset();
    obstacles = [];
    pits = [];
    powerUps = [];
    effects = [];
    score = 0;
    speed = 6;
    groundOffset = 0;

    for (let i = 0; i < 3; i++) {
      clouds.push({ x: 100 + i * 280 + Math.random() * 100, y: 30 + Math.random() * 60, w: 40 + Math.random() * 45, h: 12 + Math.random() * 8, speed: 1 + Math.random() * 2 });
    }
  }

  // ---- UI ----
  function drawUI() {
    // 分数
    ctx.fillStyle = '#535353';
    ctx.font = '18px "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(Math.floor(score).toString().padStart(5, '0'), W - 30, 30);

    // 最高分
    if (hiScore > 0) {
      ctx.fillStyle = '#bbb';
      ctx.font = '13px "Courier New", monospace';
      ctx.fillText('HI ' + hiScore.toString().padStart(5, '0'), W - 120, 30);
    }

    // 护盾状态
    if (dino.hasShield && state === STATE.RUNNING) {
      ctx.fillStyle = '#4da6ff';
      ctx.font = '12px "Courier New", monospace';
      ctx.textAlign = 'left';
      ctx.fillText('🛡 SHIELD', 20, 30);
    }

    // 等待提示
    if (state === STATE.WAITING) {
      ctx.fillStyle = '#535353';
      ctx.font = '15px "Courier New", monospace';
      ctx.textAlign = 'center';
      const alpha = 0.4 + 0.3 * Math.sin(Date.now() / 600);
      ctx.globalAlpha = alpha;
      ctx.fillText('按空格键或点击屏幕开始', W / 2, H / 2 - 30);
      ctx.globalAlpha = 1;
    }

    // 结束
    if (state === STATE.OVER) {
      ctx.fillStyle = '#535353';
      ctx.font = 'bold 22px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('G A M E   O V E R', W / 2, H / 2 - 20);
      ctx.font = '13px "Courier New", monospace';
      ctx.fillStyle = '#888';
      ctx.fillText('空格键 / 点击  重新开始', W / 2, H / 2 + 20);
    }
  }

  function updateDifficulty() {
    speed = 6 + Math.floor(score / 300) * 0.6;
    if (speed > 14) speed = 14;
  }

  // ---- 伤害处理 ----
  function hitPlayer() {
    if (dino.hasShield) {
      // 护盾吸收伤害
      dino.hasShield = false;
      dino.shieldFlash = 15;
      sfxShieldBrk();
      addEffect(dino.x + 10, dino.y - 60, 'SHIELD BROKEN', '#ff6b6b');
      // 短暂无敌闪烁期间移除当前碰撞的障碍物，避免重复触发
      return 'absorbed';
    }
    // 真正死亡
    state = STATE.OVER;
    sfxDie();
    if (score > hiScore) {
      hiScore = Math.floor(score);
      localStorage.setItem('dinoHiScoreV2', hiScore);
    }
    return 'killed';
  }

  // ---- 主循环 ----
  function gameLoop() {
    ctx.clearRect(0, 0, W, H);

    ctx.fillStyle = '#f7f7f7';
    ctx.fillRect(0, 0, W, H);

    // ---- 云 ----
    for (let c of clouds) {
      if (state === STATE.RUNNING) c.x -= c.speed;
      else if (state === STATE.WAITING) c.x -= c.speed * 0.3;
      if (c.x < -80) {
        c.x = W + 40;
        c.y = 30 + Math.random() * 80;
      }
      drawCloud(c);
    }

    // ---- 地面 ----
    if (state === STATE.RUNNING) {
      groundOffset += speed;
    }

    // ---- 生成障碍物 & 坑洞 & 道具 ----
    if (state === STATE.RUNNING) {
      // 找到所有待生成物的最右位置
      const allEntities = [
        ...obstacles.map(o => ({ x: o.x, w: o.width || 0 })),
        ...pits.map(p => ({ x: p.x, w: p.width })),
        ...powerUps.map(p => ({ x: p.x, w: 24 })),
      ];
      const rightmost = allEntities.length
        ? Math.max(...allEntities.map(e => e.x + e.w))
        : 0;
      const minGap = Math.max(250 - speed * 8, 110);

      if (rightmost < W - minGap) {
        const roll = Math.random();

        if (roll < 0.15) {
          // 坑洞（15% 概率，但必须在地面上没有坑洞紧挨着）
          const lastPit = pits[pits.length - 1];
          if (!lastPit || lastPit.x < W - 180) {
            spawnPit();
          } else {
            spawnObstacle();
          }
        } else if (roll < 0.25) {
          // 护盾道具（10% 概率，且当前没有护盾时才出现，限制频率）
          const lastPU = powerUps[powerUps.length - 1];
          if (!dino.hasShield && (!lastPU || lastPU.x < W - 400)) {
            spawnShield();
          } else {
            spawnObstacle();
          }
        } else {
          spawnObstacle();
        }
      }
    }

    // ---- 更新 / 绘制 pit ----
    for (let i = pits.length - 1; i >= 0; i--) {
      const pit = pits[i];
      if (state === STATE.RUNNING) pit.x -= speed;
      if (pit.x < -80) { pits.splice(i, 1); continue; }
      drawPit(pit.x, GROUND_Y);

      if (!pit.passed && pit.x + PIT_WIDTH < DINO_X) {
        pit.passed = true;
        score += 10;
        if (score % 100 === 0) sfxScore();
        updateDifficulty();
      }
    }

    // ---- 更新 / 绘制 powerUp ----
    for (let i = powerUps.length - 1; i >= 0; i--) {
      const pu = powerUps[i];
      if (state === STATE.RUNNING) pu.x -= speed;
      if (pu.x < -80) { powerUps.splice(i, 1); continue; }
      drawShieldPickup(pu);
    }

    // ---- 更新 / 绘制 obstacle ----
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const obs = obstacles[i];
      if (state === STATE.RUNNING) obs.x -= speed;
      if (obs.x < -60) { obstacles.splice(i, 1); continue; }

      if (obs.flyY !== undefined) {
        OBSTACLE_TYPES.BIRD.draw(ctx, obs.x, obs.y);
      } else {
        obs.draw(ctx, obs.x, obs.y);
      }

      if (!obs.passed && obs.x + obs.width < DINO_X) {
        obs.passed = true;
        score += 10;
        if (score % 100 === 0) sfxScore();
        updateDifficulty();
      }
    }

    // ---- 恐龙 ----
    dino.update();

    // ---- 地面绘制（在恐龙之后画坑，恐龙压在坑上面） ----
    drawGround();
    dino.draw(ctx);

    // ---- 特效 ----
    for (let i = effects.length - 1; i >= 0; i--) {
      const ef = effects[i];
      ef.life--;
      ef.alpha = ef.life / 40;
      if (ef.life <= 0) { effects.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = ef.alpha;
      ctx.fillStyle = ef.color;
      ctx.font = 'bold 13px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(ef.text, ef.x, ef.y - (40 - ef.life) * 0.6);
      ctx.restore();
    }

    // ---- 碰撞检测 ----
    if (state === STATE.RUNNING) {
      const dBox = dino.getHitbox();

      // 与障碍物碰撞
      for (let obs of obstacles) {
        let oBox;
        if (obs.flyY !== undefined) {
          oBox = { x: obs.x + 8, y: obs.y - 16, w: 28, h: 16 };
        } else {
          oBox = { x: obs.x + 2, y: obs.y - obs.height, w: obs.width - 4, h: obs.height };
        }
        if (rectsCollide(dBox, oBox)) {
          const result = hitPlayer();
          if (result === 'killed') break;
          // 护盾吸收了：移除这个障碍物防止重复触发
          if (result === 'absorbed') {
            obstacles.splice(obstacles.indexOf(obs), 1);
            break;
          }
        }
      }

      // 与坑洞碰撞（只有在地面上时才会掉进去）
      if (state === STATE.RUNNING && dino.grounded) {
        for (let pit of pits) {
          const pBox = { x: pit.x + 6, y: GROUND_Y, w: PIT_WIDTH - 12, h: PIT_HEIGHT };
          if (rectsCollide(dBox, pBox)) {
            hitPlayer();
            break;
          }
        }
      }

      // 拾取护盾
      for (let i = powerUps.length - 1; i >= 0; i--) {
        const pu = powerUps[i];
        const puBox = { x: pu.x, y: pu.y - 34, w: 24, h: 30 };
        if (rectsCollide(dBox, puBox)) {
          dino.hasShield = true;
          sfxPickup();
          addEffect(pu.x + 12, pu.y - 20, '🛡 SHIELD!', '#4da6ff');
          powerUps.splice(i, 1);
        }
      }
    }

    // ---- UI ----
    drawUI();

    requestAnimationFrame(gameLoop);
  }

  // ---- 输入 ----
  function handleJump() {
    initAudio();
    if (state === STATE.WAITING) {
      state = STATE.RUNNING;
      resetGame();
      dino.jump();
    } else if (state === STATE.RUNNING) {
      dino.jump();
    } else if (state === STATE.OVER) {
      state = STATE.RUNNING;
      resetGame();
      dino.jump();
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      handleJump();
    }
    if (e.code === 'ArrowDown') {
      e.preventDefault();
      if (state === STATE.RUNNING) {
        dino.duck(true);
        if (!dino.grounded) {
          dino.vy += 1.2;
        }
      }
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowDown') {
      dino.duck(false);
    }
  });

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    handleJump();
  });

  // ---- 初始化 ----
  resetGame();
  gameLoop();
})();
</script>
</body>
</html>
